<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fafaf9" />
    <title>Aurumers · 历史记录</title>
    <link rel="stylesheet" href="/static/css/app.css" />
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23b8860b'/><path d='M9 9h14v3l-3.5 4 3.5 4v3H9v-3l3.5-4L9 12z' fill='none' stroke='white' stroke-width='1.6'/></svg>" />
    <script type="module" src="/static/js/records.js" defer></script>
</head>
<body>
    <div class="shell">
        <header class="topbar" data-anim="0">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true"></div>
                <span class="brand-name">Aurumers</span>
                <span class="brand-tag">· 历史记录</span>
            </div>
            <nav class="nav">
                <a href="/">看板</a>
                <a href="/records" class="active">历史记录</a>
            </nav>
        </header>

        <section data-anim="1">
            <h1 class="hero-title" style="font-size:32px;margin:18px 0 6px;">分析记录</h1>
            <p class="hero-sub" style="margin-bottom:24px;">所有手动 / 调度跑出的分析记录都在此留痕。点击任意一行查看详情，可删除可复盘。</p>

            <div class="filters">
                <label class="search">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input id="search-input" type="text" placeholder="搜索摘要、新闻、建议…" autocomplete="off" />
                </label>
                <div class="range-toggle" role="group" aria-label="时间范围">
                    <button data-range="24h" class="active" aria-pressed="true" aria-label="时间范围 24 小时">24h</button>
                    <button data-range="7d" aria-pressed="false" aria-label="时间范围 7 天">7d</button>
                    <button data-range="30d" aria-pressed="false" aria-label="时间范围 30 天">30d</button>
                    <button data-range="all" aria-pressed="false" aria-label="时间范围 全部">全部</button>
                </div>
                <div class="range-toggle" role="group" aria-label="趋势筛选">
                    <button data-trend="all" class="active" aria-pressed="true" aria-label="趋势 全部">全部</button>
                    <button data-trend="上涨" aria-pressed="false" aria-label="趋势 上涨">上涨</button>
                    <button data-trend="下跌" aria-pressed="false" aria-label="趋势 下跌">下跌</button>
                    <button data-trend="震荡" aria-pressed="false" aria-label="趋势 震荡">震荡</button>
                </div>
                <div class="range-toggle" role="group" aria-label="状态筛选">
                    <button data-status-filter="all" class="active" aria-pressed="true" aria-label="状态 全部">全部</button>
                    <button data-status-filter="success" aria-pressed="false" aria-label="状态 成功">成功</button>
                    <button data-status-filter="partial" aria-pressed="false" aria-label="状态 部分成功">部分</button>
                    <button data-status-filter="failed" aria-pressed="false" aria-label="状态 失败">失败</button>
                </div>
            </div>

            <div id="records-empty" class="empty" style="display:none;">没有匹配的记录。试试放宽筛选条件。</div>
            <div id="records-host" class="records"></div>
        </section>
    </div>

    <div id="drawer-backdrop" class="drawer-backdrop" aria-hidden="true"></div>
    <aside id="drawer" class="drawer" role="dialog" aria-labelledby="drawer-title" aria-hidden="true">
        <div class="drawer-head">
            <div>
                <div style="font-size:13px;color:var(--c-text-mute);letter-spacing:.04em;text-transform:uppercase;">分析详情</div>
                <h2 id="drawer-title" class="panel-title num" style="margin-top:4px;">—</h2>
                <div id="drawer-meta" class="panel-sub" style="margin:4px 0 0;">—</div>
                <div style="display:flex;gap:8px;margin-top:10px;">
                    <span id="drawer-trend" class="chip chip-unknown">未知</span>
                    <span id="drawer-status" class="chip chip-unknown">—</span>
                </div>
            </div>
            <button id="drawer-close" class="drawer-close" aria-label="关闭">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <div class="drawer-section">
            <h3>摘要</h3>
            <p id="drawer-summary" style="margin:0;color:var(--c-text);line-height:1.7;">—</p>
        </div>

        <div class="drawer-section">
            <h3>原因分析</h3>
            <ul class="list-clean" id="drawer-reasons"></ul>
        </div>

        <div class="drawer-section">
            <h3>操作建议</h3>
            <p id="drawer-advice" style="margin:0;color:var(--c-text);line-height:1.7;">—</p>
        </div>

        <div class="drawer-section">
            <h3>相关新闻</h3>
            <ul class="news-list" id="drawer-news"></ul>
        </div>

        <div class="drawer-section">
            <dl class="kv">
                <dt>置信度</dt><dd class="num" id="drawer-confidence">—</dd>
                <dt>错误信息</dt><dd id="drawer-error">无</dd>
            </dl>
        </div>

        <div class="drawer-section">
            <h3>原始模型输出</h3>
            <pre class="raw" id="drawer-raw">—</pre>
        </div>

        <div class="drawer-section" style="display:flex;gap:8px;justify-content:flex-end;">
            <button id="drawer-delete" class="btn btn-ghost" style="color:var(--c-down);border-color:var(--c-down-soft);">删除该记录</button>
        </div>
    </aside>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
